name: Post-Merge HA Compatibility Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ha-compatibility-test:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Prüfe ob HA-Test nötig ist
        id: check-needed
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_BRANCH="${GITHUB_BASE_REF}"
            git fetch origin "${BASE_BRANCH}" --depth=1
            DIFF_BASE="origin/${BASE_BRANCH}"
          else
            DIFF_BASE="HEAD~1"
          fi

          # Prüfe ob HA-relevante Dateien geändert wurden
          if git diff "${DIFF_BASE}" HEAD --name-only | grep -E "(requirements.*\.txt|manifest\.json)"; then
            echo "test_needed=true" >> "${GITHUB_OUTPUT}"
            echo "HA-relevante Änderungen erkannt - Test wird ausgeführt"
          else
            echo "test_needed=false" >> "${GITHUB_OUTPUT}"
            echo "Keine HA-relevanten Änderungen - Test wird übersprungen"
          fi

      - name: HA-Test überspringen
        if: steps.check-needed.outputs.test_needed == 'false'
        run: |
          echo "HA-Kompatibilitätstest übersprungen - keine relevanten Änderungen"
          echo "Check erfolgreich abgeschlossen"

      - name: Test-Stack dynamisch aus PHACC ermitteln
        if: steps.check-needed.outputs.test_needed == 'true'
        id: test-stack
        run: |
          python3 - <<'PY'
          import os
          import re
          import urllib.request

          base_url = "https://raw.githubusercontent.com/MatthewFlamm/pytest-homeassistant-custom-component/master"

          def fetch_text(path: str) -> str:
              with urllib.request.urlopen(f"{base_url}/{path}", timeout=30) as response:
                  return response.read().decode("utf-8")

          phacc_version = fetch_text("version").strip()
          setup_py = fetch_text("setup.py")
          requirements_test = fetch_text("requirements_test.txt")

          python_match = re.search(r'python_requires=">=([0-9]+\.[0-9]+)"', setup_py)
          python_version = python_match.group(1) if python_match else "3.14"

          homeassistant_match = re.search(
              r"^homeassistant==([0-9][^\s#]*)$",
              requirements_test,
              re.MULTILINE,
          )
          homeassistant_version = (
              homeassistant_match.group(1) if homeassistant_match else ""
          )

          if not homeassistant_version:
              raise SystemExit("Konnte Home-Assistant-Version nicht aus requirements_test.txt des PHACC-Repos ermitteln.")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"python_version={python_version}\n")
              output.write(f"phacc_version={phacc_version}\n")
              output.write(f"homeassistant_version={homeassistant_version}\n")

          print(f"Python {python_version}, PHACC {phacc_version}, Home Assistant {homeassistant_version}")
          PY

      - name: Python einrichten
        if: steps.check-needed.outputs.test_needed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.test-stack.outputs.python_version }}

      - name: Dependencies installieren
        if: steps.check-needed.outputs.test_needed == 'true'
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements_test.txt ]; then
            grep -Eiv '^[[:space:]]*(homeassistant|pytest-homeassistant-custom-component)[[:space:]]*(==|>=|<=|~=|>|<)' requirements_test.txt > /tmp/requirements_test_base.txt
            if [ -s /tmp/requirements_test_base.txt ]; then
              pip install -r /tmp/requirements_test_base.txt
            fi
          fi

          pip install "pytest-homeassistant-custom-component==${{ steps.test-stack.outputs.phacc_version }}"
          echo "Installiere Home Assistant ${{ steps.test-stack.outputs.homeassistant_version }} für den Kompatibilitätstest"
          pip install "homeassistant==${{ steps.test-stack.outputs.homeassistant_version }}" --force-reinstall

      - name: Kompatibilitätstest ausführen
        if: steps.check-needed.outputs.test_needed == 'true'
        id: tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set +e
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          python -m pytest -v --tb=short -k "not slow" --disable-warnings --strict-markers
          TEST_RESULT=$?
          set -e

          if [ $TEST_RESULT -eq 0 ]; then
            echo "test_status=success" >> "${GITHUB_OUTPUT}"
            echo "test_summary=Alle Tests erfolgreich mit HA ${{ steps.test-stack.outputs.homeassistant_version }}" >> "${GITHUB_OUTPUT}"
          elif [ $TEST_RESULT -eq 5 ]; then
            echo "test_status=no-tests" >> "${GITHUB_OUTPUT}"
            echo "test_summary=Keine Tests gefunden" >> "${GITHUB_OUTPUT}"
          else
            echo "test_status=failed" >> "${GITHUB_OUTPUT}"
            echo "test_summary=Tests fehlgeschlagen mit HA ${{ steps.test-stack.outputs.homeassistant_version }}" >> "${GITHUB_OUTPUT}"
            exit 1
          fi

      - name: Erfolg dokumentieren
        if: steps.check-needed.outputs.test_needed == 'true' && (steps.tests.outputs.test_status == 'success' || steps.tests.outputs.test_status == 'no-tests')
        run: |
          echo "Home Assistant ${{ steps.test-stack.outputs.homeassistant_version }} Kompatibilitätstest erfolgreich"
          echo "Alle Tests bestanden oder nicht erforderlich"
