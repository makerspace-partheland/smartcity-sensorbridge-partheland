name: Wöchentliche Abhängigkeitsaktualisierung (pip + manifest)

on:
  schedule:
    # GitHub cron ist UTC. Ein Termin trifft die CET-Woche, der andere die CEST-Woche.
    # Kein zusätzlicher Stunden-Guard: verspätete Scheduler-Runs dürfen nicht stillschweigend übersprungen werden.
    - cron: '0 3 * * 5' # Freitags 03:00 UTC
    - cron: '0 4 * * 5' # Freitags 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6.0.2

      - name: Python-Version dynamisch aus PHACC ermitteln
        id: phacc-python
        run: |
          python3 - <<'PY'
          import os
          import re
          import urllib.request

          url = "https://raw.githubusercontent.com/MatthewFlamm/pytest-homeassistant-custom-component/master/setup.py"
          with urllib.request.urlopen(url, timeout=30) as response:
              setup_py = response.read().decode("utf-8")

          python_match = re.search(r'python_requires=">=([0-9]+\.[0-9]+)"', setup_py)
          python_version = python_match.group(1) if python_match else "3.14"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"python_version={python_version}\n")

          print(f"Python {python_version}")
          PY

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.phacc-python.outputs.python_version }}

      - name: Requirements aktualisieren (nur patch/minor)
        id: update-deps
        run: |
          python .github/scripts/update_requirements.py
          if git diff --unified=0 -- requirements_test.txt | grep -Eq '^[+-]homeassistant[[:space:]]'; then
            HA_VERSION=$(grep "^homeassistant" requirements_test.txt | sed -E 's/^[^#]*homeassistant[[:space:]]*(==|>=)[[:space:]]*//')
            echo "ha_updated=true" >> $GITHUB_OUTPUT
            echo "homeassistant_version=$HA_VERSION" >> $GITHUB_OUTPUT
            echo "Home Assistant wird auf Version $HA_VERSION aktualisiert"
          else
            echo "ha_updated=false" >> $GITHUB_OUTPUT
            echo "homeassistant_version=" >> $GITHUB_OUTPUT
          fi

      - name: Pull Request erstellen
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
          commit-message: |
            deps: wöchentliche Abhängigkeitsaktualisierungen (patch/minor)
          title: "deps: wöchentliche Abhängigkeitsaktualisierungen (patch/minor)"
          body: |
            Automatische Aktualisierung der Python-Abhängigkeiten.

            ${{ steps.update-deps.outputs.ha_updated == 'true' && format('Home Assistant: {0}', steps.update-deps.outputs.homeassistant_version) || '' }}
          labels: dependencies, python
          branch: chore/weekly-deps-update
          delete-branch: true
